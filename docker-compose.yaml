version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logatech-net
    ports:
      - "3000:3000"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./storage:/app/storage
    networks:
      - coolify

networks:
  coolify:
    external: true
